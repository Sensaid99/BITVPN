# Отдельный server для доступа по IP (https://155.212.164.135/sub/... и /api/...).
# Подключение: в /etc/nginx/sites-available/default в конец файла (после всех server { })
# добавьте: include /opt/vpn-bot/deploy/nginx-https-by-ip.conf;
# Или скопируйте содержимое этого блока server { } в default внутрь нового server { }.
#
# Перед подключением создайте самоподписанный сертификат для IP (один раз):
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/155.212.164.135.key \
#     -out /etc/nginx/ssl/155.212.164.135.crt \
#     -subj "/CN=155.212.164.135" -addext "subjectAltName=IP:155.212.164.135"
#   sudo mkdir -p /etc/nginx/ssl
# (команду req выполнить из каталога с правами, затем ключ и серт переместить в /etc/nginx/ssl)

server {
    listen 443 ssl;
    server_name 155.212.164.135;

    ssl_certificate     /etc/nginx/ssl/155.212.164.135.crt;
    ssl_certificate_key /etc/nginx/ssl/155.212.164.135.key;

    location /sub/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        return 404;
    }
}
