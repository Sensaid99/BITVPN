# Фрагмент для nginx: вставьте внутрь блока server { } для вашего HTTPS-домена.
# Запросы на https://ваш-домен/api/ и https://ваш-домен/sub/ пойдут на miniapp-api (порт 8765).
# /sub/ — редирект подписки для Happ (ссылка из бота/мини-аппа).
# Проверка API: GET https://ваш-домен/api/health или /api/miniapp/plans (не /health — корень часто не проксируется).

location /sub/ {
    proxy_pass http://127.0.0.1:8765;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}

location /api/ {
    proxy_pass http://127.0.0.1:8765;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}
