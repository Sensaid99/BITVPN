##
# Nginx default server config (nikolay.lisobyk.fvds.ru + /api/)
# HTTP (80) + HTTPS (443). Сертификат Let's Encrypt (certbot).
# Полностью замените /etc/nginx/sites-available/default этим файлом.
##

# HTTP — порт 80
server {
        listen 80 default_server;
        listen [::]:80 default_server;

        root /var/www/html;
        index index.html index.htm index.nginx-debian.html;

        server_name nikolay.lisobyk.fvds.ru;

        location / {
                try_files $uri $uri/ =404;
        }

        location /api/ {
                proxy_pass http://127.0.0.1:8765;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
        }

        # pass PHP scripts to FastCGI server (commented)
        #location ~ \.php$ {
        #       include snippets/fastcgi-php.conf;
        #       fastcgi_pass unix:/run/php/php7.4-fpm.sock;
        #       # fastcgi_pass 127.0.0.1:9000;
        #}

        # deny access to .htaccess files
        #location ~ /\.ht {
        #       deny all;
        #}
}

# HTTPS — порт 443 (сертификат от certbot)
server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;

        ssl_certificate /etc/letsencrypt/live/nikolay.lisobyk.fvds.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nikolay.lisobyk.fvds.ru/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        root /var/www/html;
        index index.html index.htm index.nginx-debian.html;

        server_name nikolay.lisobyk.fvds.ru;

        location / {
                try_files $uri $uri/ =404;
        }

        location /api/ {
                proxy_pass http://127.0.0.1:8765;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
        }

        # pass PHP scripts to FastCGI server (commented)
        #location ~ \.php$ {
        #       include snippets/fastcgi-php.conf;
        #       fastcgi_pass unix:/run/php/php7.4-fpm.sock;
        #       # fastcgi_pass 127.0.0.1:9000;
        #}

        # deny access to .htaccess files
        #location ~ /\.ht {
        #       deny all;
        #}
}


