# Полный пример /etc/nginx/sites-available/default для VPN BOT.
# После деплоя на сервере выполните:
#   sudo cp /etc/nginx/sites-available/default /etc/nginx/sites-available/default.bak
#   sudo cp /opt/vpn-bot/deploy/nginx-default-full.conf /etc/nginx/sites-available/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Сертификат для IP создайте один раз (если ещё нет):
#   sudo mkdir -p /etc/nginx/ssl
#   sudo openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
#     -keyout /etc/nginx/ssl/155.212.164.135.key \
#     -out /etc/nginx/ssl/155.212.164.135.crt \
#     -subj "/CN=155.212.164.135" -addext "subjectAltName=IP:155.212.164.135"

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /var/www/html;
    index index.html;
    location / {
        try_files $uri $uri/ =404;
    }
}

# HTTPS по IP — ссылки из бота вида https://155.212.164.135/sub/КОД
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name 155.212.164.135;

    ssl_certificate     /etc/nginx/ssl/155.212.164.135.crt;
    ssl_certificate_key /etc/nginx/ssl/155.212.164.135.key;

    location /sub/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        return 404;
    }
}

# HTTPS по домену — мини-апп с ?api=https://nikolay.lisobyk.fvds.ru
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nikolay.lisobyk.fvds.ru;

    ssl_certificate     /etc/letsencrypt/live/nikolay.lisobyk.fvds.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nikolay.lisobyk.fvds.ru/privkey.pem;
    # Если есть certbot: раскомментируйте следующие 2 строки:
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html;
    index index.html index.htm index.nginx-debian.html;

    location /sub/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
